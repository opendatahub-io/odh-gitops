{{- if .Values.azure.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opendatahub-azure-cloud-manager-rolebinding
  namespace: {{ .Values.azure.cloudManager.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opendatahub-azure-cloud-manager-role
subjects:
  - kind: ServiceAccount
    name: opendatahub-azure-cloud-manager-operator
    namespace: {{ .Values.azure.cloudManager.namespace }}
{{- end }}
