{{- if .Values.coreweave.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opendatahub-coreweave-cloud-manager-rolebinding
  namespace: {{ .Values.coreweave.cloudManager.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opendatahub-coreweave-cloud-manager-role
subjects:
  - kind: ServiceAccount
    name: opendatahub-coreweave-cloud-manager-operator
    namespace: {{ .Values.coreweave.cloudManager.namespace }}
{{- end }}
