{{- if .Values.coreweave.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opendatahub-coreweave-cloud-manager-leader-election-rolebinding
  namespace: {{ .Values.coreweave.cloudManager.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opendatahub-coreweave-cloud-manager-leader-election-role
subjects:
  - kind: ServiceAccount
    name: opendatahub-coreweave-cloud-manager-operator
    namespace: {{ .Values.coreweave.cloudManager.namespace }}
{{- end }}
