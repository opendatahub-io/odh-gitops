{{- if .Values.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-k8s-viewer
  namespace: {{ .Values.rhaiOperator.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-k8s-viewer
subjects:
  - kind: ServiceAccount
    name: prometheus-k8s
    namespace: {{ .Values.rhaiOperator.namespace }}
{{- end }}
