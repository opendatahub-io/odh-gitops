{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: rhods-operator
  name: rhods-operator
  namespace: {{ .Values.rhaiOperator.namespace }}
spec:
  replicas: 3
  selector:
    matchLabels:
      name: rhods-operator
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: rhods-operator
      labels:
        name: rhods-operator
      namespace: redhat-ods-operator
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: name
                      operator: In
                      values:
                        - rhods-operator
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0.0.0.0:8080
            - --leader-elect
          command:
            - /manager
          env:
            - name: DISABLE_DSC_CONFIG
              value: "false"
            - name: OPERATOR_NAME
              value: rhods-operator
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DEFAULT_MANIFESTS_PATH
              value: /opt/manifests
