# helmtemplate-generator configuration for RHAI operator chart

filter:
  include:
    - kinds:
        - CustomResourceDefinition
      names:
        - "kserves.components.platform.opendatahub.io"
    - kinds:
        - MutatingWebhookConfiguration
      names:
        - "connection-llmisvc.opendatahub.io"
        - "connection-isvc.opendatahub.io"

rules:
  # Replace namespace references with Helm template
  - path: .metadata.namespace
    value: '{{ .Values.rhaiiOperator.namespace }}'

  # Replace Namespace resource name
  - match:
      kinds:
        - Namespace
      names:
        - 'redhat-ods-operator|opendatahub-operator-system'
    changes:
      - path: .metadata.name
        value: '{{ .Values.rhaiiOperator.namespace }}'

  - match:
      kinds:
        - Namespace
      names:
        - 'redhat-ods-applications'
        - 'opendatahub'
    changes:
      - path: .metadata.name
        value: '{{ .Values.rhaiiOperator.namespace }}'


  # Replace namespace in RoleBinding/ClusterRoleBinding subjects
  - match:
      kinds:
        - RoleBinding
        - ClusterRoleBinding
    changes:
      - path: .subjects[0].namespace
        value: '{{ .Values.rhaiiOperator.namespace }}'

  # Replace namespace in webhook service references
  - match:
      kinds:
        - ValidatingWebhookConfiguration
        - MutatingWebhookConfiguration
    changes:
      - path: .webhooks[0].clientConfig.service.namespace
        value: '{{ .Values.rhaiiOperator.namespace }}'

  # Wrap CRDs with installCRDs condition
  - match:
      kinds:
        - CustomResourceDefinition
    wrap:
      before: '{{- if .Values.installCRDs }}'
      after: '{{- end }}'

  # Wrap non-CRD resources with enabled condition
  - match:
    wrap:
      before: '{{- if .Values.enabled }}'
      after: '{{- end }}'

  # Replace imagePullSecrets in Deployments with Helm template
  - match:
      kinds:
        - Deployment
    path: .spec.template.spec.imagePullSecrets
    replaceWith: |
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range . }}
        - name: {{ . }}
      {{- end }}
      {{- end }}

  # Replace manager container image with Helm template value
  - match:
      kinds:
        - Deployment
    changes:
      - path: .spec.template.spec.containers[0].image
        value: '{{ .Values.rhaiiOperator.image }}'

output:
  splitByDocument: true
  directoryRules:
    - match:
        kinds:
          - CustomResourceDefinition
      directory: crds
    - match:
        kinds:
          - Role
          - RoleBinding
          - ClusterRole
          - ClusterRoleBinding
          - ServiceAccount
      directory: rbac
    - match:
        kinds:
          - Deployment
          - Namespace
      directory: manager
    - match:
        kinds:
          - ValidatingWebhookConfiguration
          - MutatingWebhookConfiguration
      directory: webhooks
    - match:
        kinds:
          - Service
        names:
          - '*webhook*'
      directory: webhooks
    - match:
        kinds:
          - Service
      directory: manager
