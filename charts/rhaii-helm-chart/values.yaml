# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: DEFAULT_MANAGER_IMAGE

# Azure cloud configuration
azure:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: cloudmanager-operator-system
    # Cloud Manager container image
    image: DEFAULT_AZURE_CLOUD_MANAGER_IMAGE
  # AzureKubernetesEngine CR configuration
  kubernetesEngine:
    dependencies:
      certManager:
        managementPolicy: Managed
      gatewayAPI:
        managementPolicy: Managed
      lws:
        managementPolicy: Managed
      sailOperator:
        managementPolicy: Managed

# CoreWeave cloud configuration
coreweave:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: cloudmanager-operator-system
    # Cloud Manager container image
    image: DEFAULT_COREWEAVE_CLOUD_MANAGER_IMAGE
  # CoreWeaveKubernetesEngine CR configuration
  kubernetesEngine:
    dependencies:
      certManager:
        managementPolicy: Managed
      gatewayAPI:
        managementPolicy: Managed
      lws:
        managementPolicy: Managed
      sailOperator:
        managementPolicy: Managed

# Kserve component CR configuration
components:
  kserve:
    spec: {}

# Image pull secrets for private registries (list of secret names)
imagePullSecrets: []
# Example:
# imagePullSecrets:
#   - my-registry-secret
