apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuadrant-operator-controller-manager
  namespace: {{ .Values.operatorNamespace }}
  labels:
    app.kubernetes.io/component: kuadrant-operator
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/component: kuadrant-operator
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/component: kuadrant-operator
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: kuadrant-operator-controller-manager
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ .Values.images.operators.kuadrant }}
          imagePullPolicy: IfNotPresent
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
            - --leader-elect
          env:
            - name: EXTENSIONS_DIR
              value: /extensions
            - name: RELATED_IMAGE_WASMSHIM
              value: {{ .Values.images.components.wasmshim }}
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp-kuadrant
              mountPath: /tmp/kuadrant
      volumes:
        - name: tmp-kuadrant
          emptyDir: {}
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: sku
                operator: NotIn
                values: ["gpu"]
