apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: limitador-operator-manager-role
rules:
  # Core API resources
  - apiGroups:
      - ""
    resources:
      - events
      - configmaps
      - secrets
      - services
      - serviceaccounts
      - pods
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  # Apps
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments/status
    verbs:
      - get
      - patch
      - update
  # Coordination
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Limitadors
  - apiGroups:
      - limitador.kuadrant.io
    resources:
      - limitadors
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - limitador.kuadrant.io
    resources:
      - limitadors/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - limitador.kuadrant.io
    resources:
      - limitadors/finalizers
    verbs:
      - update
  # PVCs
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Monitoring
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
      - podmonitors
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Policy
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Auth
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: limitador-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: limitador-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: limitador-operator-controller-manager
    namespace: {{ .Values.operatorNamespace }}
